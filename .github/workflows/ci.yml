name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build distributions
        run: python -m pip install build && python -m build

      - name: Verify built wheel in clean environment
        shell: python
        run: |
          import glob
          import os
          import pathlib
          import subprocess
          import venv

          env_dir = pathlib.Path(".pkg-test")
          venv.EnvBuilder(with_pip=True, clear=True).create(env_dir)

          if os.name == "nt":
              env_python = env_dir / "Scripts" / "python.exe"
              env_cli = env_dir / "Scripts" / "brave-updater.exe"
          else:
              env_python = env_dir / "bin" / "python"
              env_cli = env_dir / "bin" / "brave-updater"

          wheel = sorted(glob.glob("dist/*.whl"))
          if not wheel:
              raise SystemExit("No wheel built in dist/")

          subprocess.check_call([str(env_python), "-m", "pip", "install", wheel[-1]])
          subprocess.check_call(
              [
                  str(env_python),
                  "-c",
                  (
                      "import importlib.metadata, brave_updater; "
                      "assert importlib.metadata.version('brave-updater') == brave_updater.__version__"
                  ),
              ]
          )
          subprocess.check_call([str(env_cli), "--help"])
